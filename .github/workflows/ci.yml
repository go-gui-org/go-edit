name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-edit

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-gui
          ref: v0.9.2
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          ref: v1.6.4
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Test
        working-directory: go-edit
        run: go test ${{ runner.os == 'Linux' && '-race' || '' }} ./edit/...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-edit

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-gui
          ref: v0.9.2
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          ref: v1.6.4
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Vet
        working-directory: go-edit
        run: go vet ./edit/...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: go-edit
